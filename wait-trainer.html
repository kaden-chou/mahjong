<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wait Trainer</title>
  <script>/* set theme early to avoid flash */(function(){try{var t=localStorage.getItem('theme-preference');if(!t&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)t='dark';if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){} })();</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--accent);">
    <h1 style="margin: 0; cursor: pointer;" onclick="window.location.href='index.html';">Chinitsu Trainer</h1>
    <div style="display: flex; gap: 0.5rem;">
      <button class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="stats-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--muted);">
    <div style="flex: 1; text-align: left;">
      <span id="question-counter" style="color: var(--muted); font-size: 1.2rem;">1/3</span>
    </div>
    <div style="flex: 1; text-align: center; min-width: 50px; display: flex; justify-content: center;">
      <span id="feedback-bar-emoji" style="font-size: 1.3rem; min-height: 1.3rem; min-width: 1.3rem; display: inline-flex; align-items: center; justify-content: center;"><!-- ✓ or ✗ --></span>
    </div>
    <div style="flex: 1; text-align: right;">
      <span id="timer-bar-display" style="color: var(--muted); font-size: 1.2rem;">0.0s</span>
    </div>
  </div>
  
  <main style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 1rem;">
    <!-- Main centered content -->
    <div style="display: flex; flex-direction: column; align-items: center;">
    <div id="combinations-container" style="display: flex; flex-direction: column; gap: 1rem; align-items: center; margin: 0;">
      <div style="text-align: center;">
        <p id="combination-display" style="font-size: 4rem; margin: 0; font-family: 'MahjongFont';">--</p>
      </div>
      
      <!-- 3x3 Grid of selectable buttons with feedback emoji on the right -->
      <div style="display: flex; gap: 1rem; justify-content: center; align-items: flex-start; margin: 0.5rem 0;">
        <div style="display: grid; grid-template-columns: repeat(3, 75px); gap: 10px;">
          <button class="select-btn" data-num="1">1</button>
          <button class="select-btn" data-num="2">2</button>
          <button class="select-btn" data-num="3">3</button>
          <button class="select-btn" data-num="4">4</button>
          <button class="select-btn" data-num="5">5</button>
          <button class="select-btn" data-num="6">6</button>
          <button class="select-btn" data-num="7">7</button>
          <button class="select-btn" data-num="8">8</button>
          <button class="select-btn" data-num="9">9</button>
        </div>
        
        <!-- Feedback emoji -->
        <div id="feedback-section" style="display: none; text-align: center; min-width: 50px;">
          <p id="feedback-emoji" style="font-size: 2rem; margin: 0;"><!-- ✓ or ✗ --></p>
        </div>
      </div>
    </div>
    
    <div id="activity-buttons" style="display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 0.5rem;">
      <button id="pass-btn" class="btn" style="background-color: #d1495a; margin-bottom: 0;">End</button>
      <button id="next-btn" class="btn" style="background-color: #4caf50; margin-bottom: 0;">Next</button>
    </div>
    <p style="font-size: 0.75rem; color: var(--muted); text-align: center; margin: 0.25rem 0;">Seed: <span id="seed-display">-</span></p>
    
    <div id="finish-text" style="display: none; text-align: center; font-size: 1.3rem; font-weight: bold; margin: 0.5rem 0;">Score: 0/3</div>
    
    <div id="finish-buttons" style="display: none; gap: 0.75rem; justify-content: center; margin-bottom: 0.5rem;">
      <button id="review-btn" class="btn" style="background-color: #2196f3; margin-bottom: 0;">Review</button>
      <button id="try-again-btn" class="btn" style="background-color: #ff9800; margin-bottom: 0;">Try Again</button>
      <button id="back-home-btn" class="btn" style="background-color: #2196f3; margin-bottom: 0;">Back To Home</button>
    </div>
    
    <div id="review-view" style="display: none; flex-direction: column; gap: 1rem; align-items: center; margin: 0.5rem 0;">
      <h2 style="margin: 0;">Review - Seed: <span id="review-seed">-</span></h2>
      <div id="review-patterns" style="display: flex; flex-direction: column; gap: 1rem; width: 100%;"></div>
      <button id="back-review-btn" class="btn" style="background-color: #2196f3; margin-bottom: 0;">Back</button>
    </div>
    </div>
  </main>
  <footer>
    <p>Made by Kaden Chou</p>
  </footer>
  <script src="js/main.js"></script>
  <script src="js/combinations.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/wait-trainer.js"></script>
</body>
</html>
