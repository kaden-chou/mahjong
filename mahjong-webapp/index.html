<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chinitsu Trainer</title>
  <script>/* set theme early to avoid flash */(function(){try{var t=localStorage.getItem('theme-preference');if(!t&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)t='dark';if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){} })();</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="font-size: x-large;">
  <header style="text-align: center; position: relative;">
    <h1 style="margin: 0;">Chinitsu Trainer</h1>
    <button class="theme-toggle" aria-label="Toggle theme" title="Toggle theme" style="position: absolute; right: 0.75rem; top: 0.75rem;">🌙</button>
    <button id="settings-btn" aria-label="Settings" title="Settings" style="position: absolute; right: 3rem; top: 0.75rem; border: 0; background: transparent; font-size: 1.2rem; padding: 0.35rem 0.5rem; border-radius: 6px; cursor: pointer; color: var(--text);">⚙️</button>
  </header>

  <!-- Settings modal -->
  <div id="settings-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: var(--bg); border: 1px solid var(--accent); border-radius: 8px; padding: 2rem; max-width: 400px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
      <h2 style="margin-top: 0; margin-bottom: 1rem;">Settings</h2>
      
      <!-- Suit setting -->
      <div style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;">
        <p style="margin: 0; font-weight: bold;">Suit:</p>
        <div style="display: flex; gap: 0.5rem;">
          <button id="suit-1m" class="suit-option-btn" style="padding: 0.5rem; background: var(--accent); color: var(--btn-text); border: 2px solid var(--accent); border-radius: 4px; cursor: pointer; font-weight: 500; font-family: 'MahjongFont'; font-size: 1.5rem;">q</button>
          <button id="suit-1p" class="suit-option-btn" style="padding: 0.5rem; background: transparent; color: var(--text); border: 2px solid var(--accent); border-radius: 4px; cursor: pointer; font-family: 'MahjongFont'; font-size: 1.5rem;">a</button>
          <button id="suit-1s" class="suit-option-btn" style="padding: 0.5rem; background: transparent; color: var(--text); border: 2px solid var(--accent); border-radius: 4px; cursor: pointer; font-family: 'MahjongFont'; font-size: 1.5rem;">z</button>
          <button id="suit-random" class="suit-option-btn" style="padding: 0.5rem; background: transparent; color: var(--text); border: 2px solid var(--accent); border-radius: 4px; cursor: pointer;">Random</button>
        </div>
      </div>
      
      <button id="close-settings-btn" style="width: 100%; padding: 0.5rem; background: var(--muted); color: var(--text); border: none; border-radius: 4px; cursor: pointer;">Close</button>
    </div>
  </div>

  <main>
    <p>Wait Trainer:</p>
    <nav aria-label="Main navigation">
      <div class="nav" style="justify-items: center; align-items: center;">
        <div><a class="btn" href="wait-trainer.html">7 Tile Mode</a></div>
        <div><a class="btn" href="wait-trainer.html">10 Tile Mode</a></div>
      </div>
    </nav>
  </main>

  <footer>
    <p>Made by Kaden Chou</p>
  </footer>
  <script src="js/theme-toggle.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
